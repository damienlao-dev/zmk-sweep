on: [push, pull_request, workflow_dispatch]

name: Build

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('manifest-dir/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: West Build (Cradio Left)
        run: west build -s zmk/app -b nice_nano//zmk -- -DSHIELD=cradio_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Cradio Left Kconfig file
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename left firmware
        run: cp build/zephyr/zmk.uf2 cradio_left_nice_nano.uf2

      - name: Archive left firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-zmk-sweep-left
          path: cradio_left_nice_nano.uf2

      - name: West Build (Cradio Right)
        run: west build --pristine -s zmk/app -b nice_nano//zmk -- -DSHIELD=cradio_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Cradio Right Kconfig file
        run: cat build/zephyr/.config | grep -v "^#" | grep -v "^$"

      - name: Rename right firmware
        run: cp build/zephyr/zmk.uf2 cradio_right_nice_nano.uf2

      - name: Archive right firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-zmk-sweep-right
          path: cradio_right_nice_nano.uf2
